# ============================================================================
#  llama-server router-mode preset  —  M5 Max 64GB (unified memory)
#  Models live in:  /usr/local/lib/llama-models
#
#  Load with:   llama-server --models-preset /usr/local/lib/llama-models/models.ini --port 10000
#
#  HOW THIS WORKS
#  --------------
#  * Each [section] name becomes the model ID clients send in the OpenAI
#    "model" field (e.g. {"model": "deepseek-r1-32b"}).
#  * "model = <absolute path>" points at the GGUF on disk. With explicit
#    paths the section name is a free-form alias and does NOT have to match
#    the filename. (The community/filename-matching convention also works if
#    you omit "model =" and instead rely on --models-dir + filename == section.)
#  * Router loads a model on first request and unloads per --models-max when
#    a different model is requested. See systemd/launchd files for the flags.
#
#  IMPORTANT: edit the three "model =" paths to match your EXACT filenames.
#  Run  `ls /usr/local/lib/llama-models/*.gguf`  and paste the real names in.
#
#  The INI interface in llama.cpp is still evolving. If a key is rejected by
#  your build, run `llama-server --help` and check tuning-guide.md §"Verify".
# ============================================================================


# ---------------------------------------------------------------------------
# DeepSeek-R1-32B  — reasoning workhorse. Dense 32B, the heavy hitter.
# At Q4_K_M (~19-20GB weights) it fits comfortably in 64GB unified memory.
# Full GPU offload. Reasoning models like longer context for their <think>.
# ---------------------------------------------------------------------------
[deepseek-r1-32b]
model      = /usr/local/lib/llama-models/deepseek-r1-32b-ds-q4_k_m.gguf
ctx-size   = 16384
ngl        = 999
threads    = 12
flash-attn = on
temp       = 0.6
top-p      = 0.95
cache-type-k = q8_0
cache-type-v = q8_0


# ---------------------------------------------------------------------------
# Qwen3-4B-Instruct  — fast, lightweight chat/utility model. Always-resident
# candidate. Tiny footprint (~2.5GB at Q4_K_M), huge context headroom.
# This is your low-latency default for quick turns and tool routing.
# ---------------------------------------------------------------------------
[qwen3-4b-it]
model      = /usr/local/lib/llama-models/qwen3-4b-it-q4_k_m.gguf
ctx-size   = 32768
ngl        = 999
threads    = 12
flash-attn = on
temp       = 0.7
top-p      = 0.8
top-k      = 20


# ---------------------------------------------------------------------------
# Qwen3-Coder-30B-A3B  — MoE coding model (30B total / ~3B active).
# Extremely fast for its size because only ~3B params activate per token.
# Big context is the whole point for a coding model — give it room.
# NOTE: your file is Q6_K_XL (~25GB weights), not Q4 — higher quality but
# a bigger memory footprint. Still fine resident alone on 64GB; see tuning.
# ---------------------------------------------------------------------------
[qwen3-coder-30b]
model      = /usr/local/lib/llama-models/qwen3-coder-30b-a3b-cd-ud-q6_k_xl.gguf
ctx-size   = 65536
ngl        = 999
threads    = 12
flash-attn = on
temp       = 0.7
top-p      = 0.8
top-k      = 20
