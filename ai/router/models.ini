# ============================================================================
#  llama-server router-mode preset  —  M5 Max 64GB (unified memory)
#  Models live in:  /usr/local/lib/llama-models
#
#  Load with:   llama-server --models-preset /usr/local/lib/llama-models/models.ini --port 10000
#
#  Source of truth: tracked in version control and deployed by setup script.
# ============================================================================


# ---------------------------------------------------------------------------
# Codestral 22B  — code generation / fill-in-middle. Q4_K_M (~12GB).
# ---------------------------------------------------------------------------
[codestral-22b]
model      = /usr/local/lib/llama-models/codestral-22b-v0.1-cd-q4_k_m.gguf
ctx-size   = 32768
ngl        = 999
threads    = 12
flash-attn = on
temp       = 0.7
top-p      = 0.8
top-k      = 20
cache-type-k = q8_0
cache-type-v = q8_0


# ---------------------------------------------------------------------------
# DeepSeek-R1-32B  — reasoning workhorse. Dense 32B, Q4_K_M (~19-20GB).
# ---------------------------------------------------------------------------
[deepseek-r1-32b]
model      = /usr/local/lib/llama-models/deepseek-r1-32b-ds-q4_k_m.gguf
ctx-size   = 16384
ngl        = 999
threads    = 12
flash-attn = on
temp       = 0.6
top-p      = 0.95
cache-type-k = q8_0
cache-type-v = q8_0


# ---------------------------------------------------------------------------
# Nomic Embed Text  — text embeddings (262MB, f16). RAG / semantic search.
# ---------------------------------------------------------------------------
[nomic-embed-text]
model      = /usr/local/lib/llama-models/nomic-embed-text-em-f16.gguf
ctx-size   = 8192
ngl        = 999
flash-attn = on


# ---------------------------------------------------------------------------
# Qwen 2.5 7B Multi  — small general-purpose chat. Q4_K_M (~4.4GB).
# ---------------------------------------------------------------------------
[qwen2.5-7b]
model      = /usr/local/lib/llama-models/qwen2.5-7b-multi-it-ds-q4_k_m.gguf
