# Hermes configuration — deployed by setup_ai.sh
# This is the source-of-truth; deployed to ~/.hermes/config.yaml.
# Inference backend: llama-server router on port 10000.

model:
  default: qwen3.6-35b-opus4.7-128k
  provider: llama
  base_url: http://localhost:10000/v1
  ollama_num_ctx: 131072
  context_length: 131072

providers:
  llama:
    base_url: http://localhost:10000/v1
    api_key: sk-local
  openrouter:
    base_url: https://openrouter.ai/api/v1

fallback_providers:
  - openrouter

fallback_model:
  provider: openrouter
  model: anthropic/claude-sonnet-4-6:exacto
