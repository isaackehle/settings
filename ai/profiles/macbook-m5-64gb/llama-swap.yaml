# ============================================================================
#  llama-swap config — MacBook Pro M5 Max 64GB (primary / network gateway)
#
#  This machine owns the heavy models (27B–80B) and is the proxy target for
#  all other machines in the fleet. All 17 models run locally.
#
#  Port 10000 — same as the old llama-server --models-preset router.
#  Tool configs (kilo.jsonc / opencode.jsonc) do not need to change.
#
#  Model dir:    /usr/local/lib/llama-models/
#  Install:      brew install llama-swap
#                ./install-llama-swap.sh
#  Logs:         ~/Library/Logs/llama-swap/
#
#  TTL strategy:
#    86400 = always-warm (24h idle before unload — effectively never)
#      300 = on-demand   (5 min after last use)
#       60 = ephemeral   (1 min, e.g. embedding)
# ============================================================================

healthCheckTimeout: 300

models:

  # ── Always-warm: primary coder + fast model ────────────────────────────────
  # Keep these two in memory at all times. ~21GB combined.

  qwen3-coder-30b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-coder-30b-a3b-cd-q4_k_m.gguf
        -c 65536 -ngl 999 --flash-attn
        --cache-type-k q8_0 --cache-type-v q8_0
        --jinja --threads 12
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 86400

  qwen3.5-4b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3.5-4b-it-ud-q4_k_xl.gguf
