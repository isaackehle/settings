# Continue Config - Multi-Tier Fallback
# Models reference: ~/.models
# Source: ~/code/isaackehle/settings/ai/MODEL_STRATEGY.md

name: 'Continue Config - Multi-Tier Fallback'
version: '1.0.0'
schema: 'v1'

models:
  # Cloud Models (fallback)
  - name: 'Claude Opus 4.6 (Heavy Reasoning)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-opus-4-6'
    roles: [chat]

  - name: 'Claude Sonnet 4.6 (Balanced)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-sonnet-4-6'
    roles: [chat]

  # Helper: Fast Planning (local port 10001)
  - name: 'Qwen3 4B (Fast Planning)'
    provider: openai
    apiBase: http://localhost:10001/v1
    apiKey: 'sk-local'
    model: 'qwen3:4b'
    roles: [chat]

  # Router: All models (local port 10000)
  - name: 'Qwen3 14B (Coding)'
    provider: openai
    apiBase: http://localhost:10000/v1
    apiKey: 'sk-local'
    model: 'qwen3:14b'
    roles: [chat, edit]

  - name: 'Qwen3 Coder 30B (Heavy Coding)'
    provider: openai
    apiBase: http://localhost:10000/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-30b'
    roles: [chat, edit, summarize]

  - name: 'DeepSeek R1 Tools 32B (Reasoning)'
    provider: openai
    apiBase: http://localhost:10000/v1
    apiKey: 'sk-local'
    model: 'deepseek-r1-tools:32b'
    roles: [chat]

  # Heavy: Writing (local port 59860)
  - name: 'Qwen3.5 27B (Writing)'
    provider: openai
    apiBase: http://localhost:59860/v1
    apiKey: 'sk-local'
    model: 'qwen3.5-27b'
    roles: [chat]

  # Discovery fallback (tailscale)
  - name: 'Discovery Router'
    provider: openai
    apiBase: http://100.64.0.1:10000/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-30b'
    roles: [chat, edit, summarize]

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false
disableIndexing: false
