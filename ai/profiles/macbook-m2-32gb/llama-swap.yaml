# ============================================================================
#  llama-swap config — MacBook / Mac Studio M2/M3/M4 32GB
#
#  Owns: models up to ~22B comfortably, 30B alone (tight at 32GB).
#  Proxies: 27B+ models → m5-64gb gateway at 100.64.0.1:10000.
#
#  Port 10000 — same as the old llama-server router.
#  Gateway (m5-64gb): 100.64.0.1:10000
# ============================================================================

healthCheckTimeout: 300

models:

  # ── Always-warm ────────────────────────────────────────────────────────────

  qwen3.5-4b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3.5-4b-it-ud-q4_k_xl.gguf
        -c 65536 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 86400

  qwen3-4b-it:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-4b-it-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 86400

  nomic-embed-text:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/nomic-embed-text-em-f16.gguf
        -c 8192 -ngl 999 --flash-attn
        --embeddings --threads 6
    ttl: 86400

  # ── On-demand: medium models (5–14B) ──────────────────────────────────────

  qwen3-14b-sonnet4.5:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-14b-sonnet4.5-it-ds-q4_k_m.gguf
        -c 40960 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen3-14b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-14b-it-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen3-8b-sonnet4.5:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-8b-sonnet4.5-it-ds-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen3.5-9b-opus4.7:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3.5-9b-opus4.7-it-ds-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen3.5-9b-gemini3.1:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3.5-9b-gemini3.1-it-ds-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  deepseek-r1-7b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/deepseek-r1-7b-ds-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --jinja --threads 8
        --temp 0.6 --top-p 0.95
    ttl: 300

  qwen2.5-7b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen2.5-7b-multi-it-ds-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --chat-template chatml --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen2.5-coder-7b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen2.5-coder-7b-cd-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --chat-template chatml --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen2.5-coder-1.5b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen2.5-coder-1.5b-cd-q4_k_m.gguf
        -c 32768 -ngl 999 --flash-attn
        --chat-template chatml --threads 8
        --temp 0.7 --top-p 0.8
    ttl: 300

  # ── On-demand: 22–30B (loads alone, nearly fills 32GB) ────────────────────

  codestral-22b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/codestral-22b-cd-q4_k_m.gguf
        -c 16384 -ngl 999 --flash-attn
        --cache-type-k q8_0 --cache-type-v q8_0
        --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen3-coder-30b:
    # ~18GB GGUF — fits alone, leaves ~14GB for KV/OS
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-coder-30b-a3b-cd-q4_k_m.gguf
        -c 16384 -ngl 999 --flash-attn
        --cache-type-k q8_0 --cache-type-v q8_0
        --jinja --threads 8
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  # ── Proxy → m5-64gb gateway (32B+ doesn't fit here) ──────────────────────
  # Requests for these model IDs are forwarded to the m5-64gb.
  # If m5-64gb is unreachable, the tool falls back to openrouter.

  deepseek-r1-32b:
    proxy: "http://100.64.0.1:10000"

  qwen3.5-27b-opus4.6:
    proxy: "http://100.64.0.1:10000"

  qwen3.5-27b-gemini3.1:
    proxy: "http://100.64.0.1:10000"

  qwen3.6-27b-opus-sonnet:
    proxy: "http://100.64.0.1:10000"

  qwen3.6-35b-opus4.7-128k:
    proxy: "http://100.64.0.1:10000"

  qwen3.6-35b-opus4.6:
    proxy: "http://100.64.0.1:10000"

  qwen3-coder-next-80b:
    proxy: "http://100.64.0.1:10000"
