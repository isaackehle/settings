name: 'Continue Config - Local + Cloud Models (M1 16GB)'
version: '1.0.0'
schema: 'v1'

models:
  # ── Cloud Models (via OpenRouter — direct, not proxied) ────────────────────
  - name: 'Claude Opus 4.6 (Heavy Reasoning, Best Quality)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-opus-4-6'
    roles:
      - chat

  - name: 'Claude Sonnet 4.6 (Balanced All-Rounder)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-sonnet-4-6'
    roles:
      - chat

  - name: 'GLM 5.1 (General Purpose)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'thudm/glm-5.1'
    roles:
      - chat

  - name: 'Kimi K2.6 (Deep Reasoning, Long Context)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'moonshot/kimi-k2.6'
    roles:
      - chat

  # ── Local Models via Ollama (chat / apply) ─────────────────────────────────
  - name: 'Codestral 22B (Diff)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'codestral:22b'
    roles:
      - apply

  - name: 'DeepSeek R1 8B (Reasoning, Tools)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'deepseek-r1-tools:8b'
    roles:
      - chat

  - name: 'Qwen 2.5 Coder 7B (Coding)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen2.5-coder:7b'
    roles:
      - chat
      - edit
      - summarize

  - name: 'Qwen3 4B (Planning)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3:4b'
    roles:
      - chat

  - name: 'Qwen3 14B (Coding)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3:14b'
    roles:
      - chat

  # ── Autocomplete — Ollama direct (latency-critical) ────────────────────────
  - name: 'Qwen 2.5 Coder 1.5B (Fill-In-Middle)'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'qwen2.5-coder:1.5b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  - name: 'Qwen 2.5 Coder 7B (Fill-In-Middle)'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'qwen2.5-coder:7b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # ── Embeddings — Ollama direct ─────────────────────────────────────────────
  - name: 'Nomic Embed Text (Embedding)'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'nomic-embed-text'
    roles:
      - embed

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
