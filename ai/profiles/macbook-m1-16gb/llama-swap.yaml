# ============================================================================
#  llama-swap config — MacBook M1/M2 16GB
#
#  Same model ownership as macmini-m2-16gb: small/fast models locally,
#  everything 22B+ proxied to m5-64gb.
#
#  Slightly more conservative ctx sizes than macmini to leave headroom
#  for the macOS UI + browser typically running on a laptop.
#
#  Port 10000 — consistent across all machines.
#  Gateway (m5-64gb): 100.64.0.1:10000
# ============================================================================

healthCheckTimeout: 300

models:

  # ── Always-warm ────────────────────────────────────────────────────────────

  nomic-embed-text:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/nomic-embed-text-em-f16.gguf
        -c 8192 -ngl 999 --flash-attn
        --embeddings --threads 4
    ttl: 86400

  qwen3.5-4b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3.5-4b-it-ud-q4_k_xl.gguf
        -c 16384 -ngl 999 --flash-attn
        --jinja --threads 4
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 86400

  qwen3-4b-it:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-4b-it-q4_k_m.gguf
        -c 16384 -ngl 999 --flash-attn
        --jinja --threads 4
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 86400

  qwen2.5-coder-1.5b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen2.5-coder-1.5b-cd-q4_k_m.gguf
        -c 16384 -ngl 999 --flash-attn
        --chat-template chatml --threads 4
        --temp 0.7 --top-p 0.8
    ttl: 86400

  # ── On-demand: medium models ───────────────────────────────────────────────

  qwen3-8b-sonnet4.5:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-8b-sonnet4.5-it-ds-q4_k_m.gguf
        -c 8192 -ngl 999 --flash-attn
        --jinja --threads 4
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen3-14b:
    # 8GB — tight on 16GB, keep ctx small
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen3-14b-it-q4_k_m.gguf
        -c 4096 -ngl 999 --flash-attn
        --jinja --threads 4
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  deepseek-r1-7b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/deepseek-r1-7b-ds-q4_k_m.gguf
        -c 8192 -ngl 999 --flash-attn
        --jinja --threads 4
        --temp 0.6 --top-p 0.95
    ttl: 300

  qwen2.5-coder-7b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen2.5-coder-7b-cd-q4_k_m.gguf
        -c 8192 -ngl 999 --flash-attn
        --chat-template chatml --threads 4
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  qwen2.5-7b:
    cmd: >-
      llama-server --port ${PORT}
        --model /usr/local/lib/llama-models/qwen2.5-7b-multi-it-ds-q4_k_m.gguf
        -c 8192 -ngl 999 --flash-attn
        --chat-template chatml --threads 4
        --temp 0.7 --top-p 0.8 --top-k 20
    ttl: 300

  # ── Proxy → m5-64gb gateway (22B+ too large for 16GB) ─────────────────────

  codestral-22b:
    proxy: "http://100.64.0.1:10000"

  qwen3-coder-30b:
    proxy: "http://100.64.0.1:10000"

  deepseek-r1-32b:
    proxy: "http://100.64.0.1:10000"

  qwen3.5-27b-opus4.6:
    proxy: "http://100.64.0.1:10000"

  qwen3.5-27b-gemini3.1:
    proxy: "http://100.64.0.1:10000"

  qwen3.6-27b-opus-sonnet:
    proxy: "http://100.64.0.1:10000"

  qwen3.6-35b-opus4.7-128k:
    proxy: "http://100.64.0.1:10000"

  qwen3.6-35b-opus4.6:
    proxy: "http://100.64.0.1:10000"

  qwen3-coder-next-80b:
    proxy: "http://100.64.0.1:10000"
