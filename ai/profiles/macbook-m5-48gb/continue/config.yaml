name: 'Continue Config - Local + Cloud Models (M5 Max 48GB)'
version: '1.0.0'
schema: 'v1'

models:
  # ── Cloud Models (via OpenRouter — direct, not proxied) ────────────────────
  - name: 'Claude Opus 4.6 — Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-opus-4-6'
    roles:
      - chat

  - name: 'Claude Sonnet 4.6 — Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-sonnet-4-6'
    roles:
      - chat

  - name: 'GLM 5.1 — Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'thudm/glm-5.1'
    roles:
      - chat

  - name: 'Kimi K2.6 — Reasoning, Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'moonshot/kimi-k2.6'
    roles:
      - chat

  # ── Local Models via Ollama (chat / edit / apply / summarize) ──────────────
  - name: 'Codestral 22B — Diff'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'codestral:22b'
    roles:
      - apply

  - name: 'DeepSeek R1 32B — Reasoning, Tools'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'deepseek-r1-tools:32b'
    roles:
      - chat

  - name: 'Qwen3 4B — Planning'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3:4b'
    roles:
      - chat

  - name: 'Qwen 3.5 27B — Writing, Q4'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3.5-27b:q4'
    roles:
      - chat

  - name: 'Qwen3 Coder 30B A3B — Coding, Q5'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-30b-a3b:q5'
    roles:
      - chat
      - edit
      - summarize

  # ── Autocomplete — Ollama direct (latency-critical) ────────────────────────
  - name: 'Qwen 2.5 Coder 1.5B — Fill-in-middle'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'qwen2.5-coder:1.5b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  - name: 'Qwen 2.5 Coder 7B — Fill-in-middle'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'qwen2.5-coder:7b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # ── Embeddings — Ollama direct ─────────────────────────────────────────────
  - name: 'Nomic Embed Text — Embedding'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'nomic-embed-text'
    roles:
      - embed

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
