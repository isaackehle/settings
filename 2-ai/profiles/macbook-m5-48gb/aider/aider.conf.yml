# Aider config — MacBook M5 48GB
# DEPLOY TO: ~/.aider.conf.yml

model: qwen3-coder-30b-a3b:q5
weak-model: qwen3:4b
editor-model: qwen3-coder-30b-a3b:q5

openai-api-base: http://localhost:11434/v1
openai-api-key: sk-local

auto-commits: true
dirty-commits: true
attribute-author: false
attribute-committer: false
commit-prompt: "Write a conventional commit message for these changes."

pretty: true
stream: true
show-diffs: false

map-tokens: 2048
cache-prompts: true
