name: 'Continue Config - Local + Cloud Models (M5 Max 48GB)'
version: '1.0.0'
schema: 'v1'

models:
  # ── Cloud Models (via OpenRouter — direct, not proxied) ────────────────────
  - name: 'Kimi k2.6 Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'moonshot/kimi-k2.6'
    roles:
      - chat

  - name: 'GLM-5.1 Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'thudm/glm-5.1'
    roles:
      - chat

  - name: 'Claude Sonnet 4.6'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-sonnet-4-6'
    roles:
      - chat

  - name: 'Claude Opus 4.6'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-opus-4-6'
    roles:
      - chat

  # ── Local Models via LiteLLM proxy (chat / edit / apply / summarize) ───────
  - name: 'Primary (M5 Max 48GB)'
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-30b-q5-32k'
    roles:
      - chat
      - edit
      - summarize

  - name: 'Writing / General'
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: 'sk-local'
    model: 'qwen3.5-27b-q8-256k'
    roles:
      - chat

  - name: 'Apply / Insert'
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: 'sk-local'
    model: 'codestral-22b-q6-32k'
    roles:
      - apply

  - name: 'Reasoning + Tools'
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: 'sk-local'
    model: 'deepseek-r1-tools-14b-128k'
    roles:
      - chat

  - name: 'Fast Planning'
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: 'sk-local'
    model: 'qwen3-4b-q8-256k'
    roles:
      - chat

  # ── Autocomplete — Ollama direct (latency-critical) ────────────────────────
  - name: 'Autocomplete (default)'
    provider: ollama
    apiBase: http://localhost:11434
    model: 'qwen2.5-coder:1.5b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  - name: 'Autocomplete (quality)'
    provider: ollama
    apiBase: http://localhost:11434
    model: 'qwen2.5-coder:7b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # ── Embeddings — Ollama direct ─────────────────────────────────────────────
  - name: 'Nomic Embed Text'
    provider: ollama
    apiBase: http://localhost:11434
    model: 'nomic-embed-text'
    roles:
      - embed

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
