name: "Continue Config - Local + Cloud Models (M5 48GB)"
version: "1.0.0"
schema: "v1"

models:
  # ── Cloud Models (via OpenRouter) ──────────────────────────────────────
  - name: "Kimi k2.6 Cloud"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "moonshot/kimi-k2.6"
    roles:
      - chat

  - name: "GLM-5.1 Cloud"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "thudm/glm-5.1"
    roles:
      - chat

  - name: "Claude Sonnet 4.6"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "anthropic/claude-sonnet-4-6"
    roles:
      - chat

  # ── Local Models (via Ollama) ───────────────────────────────────────────
  # Primary coding model — 30B, tool-capable
  - name: "Qwen3 Coder 30B A3B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3-coder-30b:q5-32k"
    roles:
      - chat
      - edit
      - apply
      - summarize

  # Qwen3.5 27B — general chat / writing
  - name: "Qwen3.5 27B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3.5-27b:q8-256k"
    roles:
      - chat

  # Qwen3.6 35B variants

  - name: "Qwen3.6 35B (32K)"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3.6-35b:q4-32k"
    roles:
      - chat


  # Apply/insert — best code insertion
  - name: "Codestral 22B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "codestral-22b:q6-32k"
    roles:
      - apply

  # Reasoning with tool calls
  - name: "DeepSeek R1 Tool-Calling 14B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "deepseek-r1-tools:14b-128k"
    roles:
      - chat

  # Autocomplete — default (fast, low RAM)
  - name: "Qwen2.5 Coder 1.5B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen2.5-coder:1.5b"
    requestOptions:
      timeout: 8000
    roles:
      - autocomplete

  # Autocomplete — quality
  - name: "Qwen2.5 Coder 7B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen2.5-coder:7b"
    requestOptions:
      timeout: 8000
    roles:
      - autocomplete

  # Embedding model
  - name: "Nomic Embed Text"
    provider: ollama
    apiBase: http://localhost:11434
    model: "nomic-embed-text"
    roles:
      - embed


  # Fast planning
  - name: "Qwen3 4B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3-4b:q8-256k"
    roles:
      - chat

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
