name: "Continue Config - Local + Cloud Models (M2 32GB)"
version: "1.0.0"
schema: "v1"

models:
  # ── Cloud Models (via OpenRouter) ──────────────────────────────────────
  - name: "Kimi k2.6 Cloud"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "moonshot/kimi-k2.6"
    roles:
      - chat

  - name: "GLM-5.1 Cloud"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "thudm/glm-5.1"
    roles:
      - chat

  - name: "Mistral Large 3"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "mistralai/mistral-large"
    roles:
      - chat

  - name: "Gemini 3 Flash"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "google/gemini-3-flash-preview"
    roles:
      - chat

  # ── Local Models (via Ollama) ───────────────────────────────────────────
  # Primary coding model
  - name: "Qwen3 14B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3-14b:q5-40k"
    roles:
      - chat
      - edit
      - apply
      - summarize

  # High-quality coding model
  - name: "Codestral 22B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "codestral:22b"
    roles:
      - chat
      - edit
      - apply

  # Reasoning with tool calls
  - name: "DeepSeek R1 Tool-Calling 8B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "deepseek-r1-tools:8b-128k"
    roles:
      - chat

  # Autocomplete — default (fast, low RAM)
  - name: "Qwen2.5 Coder 1.5B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen2.5-coder:1.5b"
    requestOptions:
      timeout: 8000
    roles:
      - autocomplete

  # Autocomplete — quality
  - name: "Qwen2.5 Coder 7B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen2.5-coder:7b"
    requestOptions:
      timeout: 8000
    roles:
      - autocomplete

  # Embedding model
  - name: "Nomic Embed Text"
    provider: ollama
    apiBase: http://localhost:11434
    model: "nomic-embed-text:latest"
    roles:
      - embed

  # Fast planning
  - name: "Qwen3 4B (fast, planning)"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3-4b:q4-256k"
    roles:
      - chat

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
