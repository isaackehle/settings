model_list:
  # --- Cloud Models ---
  - model_name: kimi-k2.6-cloud
    litellm_params:
      model: openrouter/moonshot/kimi-k2.6
      max_tokens: 4096
      num_ctx: 32768

  - model_name: glm-5.1-cloud
    litellm_params:
      model: openrouter/thudm/glm-5.1
      max_tokens: 4096
      num_ctx: 32768

  - model_name: mistral-large-cloud
    litellm_params:
      model: openrouter/mistralai/mistral-large
      max_tokens: 4096
      num_ctx: 32768

  - model_name: gemini-3-flash-cloud
    litellm_params:
      model: openrouter/google/gemini-3-flash-preview
      max_tokens: 4096
      num_ctx: 32768

  # --- Coding ---
  - model_name: codestral-22b
    litellm_params:
      model: ollama_chat/codestral-22b
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder-7b
    litellm_params:
      model: ollama_chat/qwen2.5-coder-7b
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder-1.5b
    litellm_params:
      model: ollama_chat/qwen2.5-coder-1.5b
      api_base: http://localhost:11434

  # --- Writing / General ---
  - model_name: qwen3.5-27b-q5-256k
    litellm_params:
      model: ollama_chat/qwen3.5-27b-q5-256k
      api_base: http://localhost:11434

  - model_name: gpt-oss-20b
    litellm_params:
      model: ollama_chat/gpt-oss-20b
      api_base: http://localhost:11434

  - model_name: gpt-oss-latest
    litellm_params:
      model: ollama_chat/gpt-oss-latest
      api_base: http://localhost:11434

  # --- Research ---
  - model_name: qwen3-14b-q8-40k
    litellm_params:
      model: ollama_chat/qwen3-14b-q8-40k
      api_base: http://localhost:11434

  - model_name: qwen3-14b-q5-40k
    litellm_params:
      model: ollama_chat/qwen3-14b-q5-40k
      api_base: http://localhost:11434

  # --- Reasoning / Tool Calls ---
  - model_name: deepseek-r1-tools-8b-128k
    litellm_params:
      model: ollama_chat/deepseek-r1-tools-8b-128k
      api_base: http://localhost:11434

  - model_name: deepseek-r1-8b
    litellm_params:
      model: ollama_chat/deepseek-r1-8b
      api_base: http://localhost:11434

  # --- Planning / Fast ---
  - model_name: qwen3-4b-q4-256k
    litellm_params:
      model: ollama_chat/qwen3-4b-q4-256k
      api_base: http://localhost:11434

  # --- Embeddings ---
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434

litellm_settings:
  set_verbose: false
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  model_group_alias:
    "gemini-2.5-pro": "qwen3.5-27b-q5-256k"
    "gemini-2.5-flash": "qwen3-14b-q5-40k"
    "gemini-2.5-flash-lite": "qwen3-4b-q4-256k"
    "gemini-3-flash-preview": "qwen3.5-27b-q5-256k"
    "gemini-3-flash-preview-customtools": "deepseek-r1-tools-8b-128k"
    "gemini-3-pro": "codestral-22b"
    "gemini-3-pro-customtools": "deepseek-r1-tools-8b-128k"
    "gemini-3.1-pro-preview": "qwen3-14b-q8-40k"
    "gemini-3.1-pro-preview-customtools": "deepseek-r1-tools-8b-128k"