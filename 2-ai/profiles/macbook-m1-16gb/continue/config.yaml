name: "Continue Config - Local + Cloud Models (M1 16GB)"
version: "1.0.0"
schema: "v1"

models:
  # ── Cloud Models (via OpenRouter) ──────────────────────────────────────
  - name: "Kimi k2.6 Cloud"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "moonshot/kimi-k2.6"
    roles:
      - chat

  - name: "GLM-5.1 Cloud"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "thudm/glm-5.1"
    roles:
      - chat

  - name: "Claude Sonnet 4.6"
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: "env.OPENROUTER_API_KEY"
    model: "anthropic/claude-sonnet-4-6"
    roles:
      - chat

  # ── Local Models (via Ollama) ───────────────────────────────────────────
  # Primary chat / edit / apply model
  - name: "Qwen3 14B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen3-14b"
    roles:
      - chat
      - edit
      - apply
      - summarize

  # Reasoning with tool calls
  - name: "DeepSeek R1 Tool-Calling 8B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "deepseek-r1-tools:8b-128k"
    roles:
      - chat

  # Autocomplete — default
  - name: "Qwen2.5 Coder 1.5B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen2.5-coder:1.5b"
    requestOptions:
      timeout: 8000
    roles:
      - autocomplete

  # Autocomplete — quality
  - name: "Qwen2.5 Coder 7B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "qwen2.5-coder:7b"
    requestOptions:
      timeout: 8000
    roles:
      - autocomplete

  # Embedding model
  - name: "Nomic Embed Text"
    provider: ollama
    apiBase: http://localhost:11434
    model: "nomic-embed-text:latest"
    roles:
      - embed

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false
