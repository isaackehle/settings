model_list:
  # --- Cloud Models ---
  - model_name: kimi-k2.6-cloud
    litellm_params:
      model: openrouter/moonshot/kimi-k2.6
      max_tokens: 4096
      num_ctx: 32768

  - model_name: glm-5.1-cloud
    litellm_params:
      model: openrouter/thudm/glm-5.1
      max_tokens: 4096
      num_ctx: 32768

  # --- General / coding ---
  - model_name: qwen3.5-27b-q5-256k
    litellm_params:
      model: ollama_chat/qwen3.5-27b:q5-256k
      api_base: http://localhost:11434
      num_ctx: 262144

  - model_name: qwen3-14b-q5-40k
    litellm_params:
      model: ollama_chat/qwen3-14b:q5-40k
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder-7b-q4-32k
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder-1.5b-q4-32k
    litellm_params:
      model: ollama_chat/qwen2.5-coder:1.5b
      api_base: http://localhost:11434
      num_ctx: 32768

  # --- Reasoning / tool calls ---
  - model_name: deepseek-r1-tools-8b-q4-128k
    litellm_params:
      model: ollama_chat/deepseek-r1-tools-8b:q4-128k
      api_base: http://localhost:11434

  - model_name: deepseek-r1-8b-q4-128k
    litellm_params:
      model: ollama_chat/deepseek-r1:8b
      api_base: http://localhost:11434

  # --- Embeddings ---
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434

  # --- Code apply/insert ---
  - model_name: codestral-22b
    litellm_params:
      model: ollama_chat/codestral:22b
      api_base: http://localhost:11434


litellm_settings:
  set_verbose: false
  drop_params: true
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url: os.environ/DATABASE_URL  # Uncomment to enable DB (requires Postgres)

router_settings:
  model_group_alias:
    'gemini-2.5-pro': 'qwen3-14b-q5-40k'
    'gemini-2.5-flash': 'qwen3-14b-q5-40k'
    'gemini-2.5-flash-lite': 'qwen3-14b-q5-40k'
    'gemini-3-flash-preview': 'qwen3-14b-q5-40k'
    'gemini-3-flash-preview-customtools': 'qwen3-14b-q5-40k'
    'gemini-3-pro': 'qwen3-14b-q5-40k'
    'gemini-3-pro-customtools': 'qwen3-14b-q5-40k'
    'gemini-3.1-pro-preview': 'qwen3-14b-q5-40k'
    'gemini-3.1-pro-preview-customtools': 'qwen3-14b-q5-40k'
