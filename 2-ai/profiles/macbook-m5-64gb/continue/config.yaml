name: 'Continue Config - Local + Cloud Models (M5 64GB)'
version: '1.0.0'
schema: 'v1'

models:
  # ── Cloud Models (via OpenRouter — direct, not proxied) ────────────────────
  - name: 'Kimi k2.6 Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'moonshot/kimi-k2.6'
    roles:
      - chat

  - name: 'GLM-5.1 Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'thudm/glm-5.1'
    roles:
      - chat

  - name: 'Codestral Cloud'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'mistralai/codestral'
    roles:
      - chat

  - name: 'Claude Sonnet 4.6'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-sonnet-4-6'
    roles:
      - chat

  - name: 'Claude Opus 4.6'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-opus-4-6'
    roles:
      - chat

  # ── Local Models via Ollama (chat / edit / apply / summarize) ──────────────
  - name: 'Qwen3 Coder Next 80B (Q4)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-next-80b:q4'
    roles:
      - chat
      - edit

  - name: 'Qwen3 Coder Next 80B (Q4, 64k)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-next-80b:q4-64k'
    roles:
      - chat
      - edit
      - summarize

  - name: 'Qwen3.6 35B (Q4)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3.6-35b:q4'
    roles:
      - chat
      - edit

  - name: 'Qwen3.5 27B (Q8)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3.5-27b:q8'
    roles:
      - chat

  - name: 'Codestral 22B'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'codestral:22b'
    roles:
      - apply

  - name: 'DeepSeek R1 Tool-Calling 32B'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'deepseek-r1-tools:32b'
    roles:
      - chat

  - name: 'Qwen3 4B (Fast)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3:4b'
    roles:
      - chat

  # ── Autocomplete — Ollama direct (latency-critical) ────────────────────────
  - name: 'Qwen2.5 Coder 1.5B (autocomplete)'
    provider: ollama
    apiBase: http://localhost:11434
    model: 'qwen2.5-coder:1.5b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  - name: 'Qwen2.5 Coder 7B (autocomplete quality)'
    provider: ollama
    apiBase: http://localhost:11434
    model: 'qwen2.5-coder:7b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # ── Embeddings — Ollama direct ─────────────────────────────────────────────
  - name: 'Nomic Embed Text'
    provider: ollama
    apiBase: http://localhost:11434
    model: 'nomic-embed-text'
    roles:
      - embed

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
