name: 'Continue Config - Local + Cloud Models (M5 64GB)'
version: '1.0.0'
schema: 'v1'

models:
  # ── Cloud Models (via OpenRouter — direct, not proxied) ────────────────────
  - name: 'Claude Opus 4.6 (CLD)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-opus-4-6'
    roles:
      - chat

  - name: 'Claude Sonnet 4.6 (CLD)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'anthropic/claude-sonnet-4-6'
    roles:
      - chat

  - name: 'Codestral (CODE, CLD)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'mistralai/codestral'
    roles:
      - chat

  - name: 'GLM 5.1 (CLD)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'thudm/glm-5.1'
    roles:
      - chat

  - name: 'Kimi K2.6 (REAS, CLD)'
    provider: openai
    apiBase: https://openrouter.ai/api/v1
    apiKey: 'env.OPENROUTER_API_KEY'
    model: 'moonshot/kimi-k2.6'
    roles:
      - chat

  # ── Local Models via Ollama (chat / edit / apply / summarize) ──────────────
  - name: 'Codestral 22B (DIFF)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'codestral:22b'
    roles:
      - apply

  - name: 'DeepSeek R1 32B (REAS, TOOL)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'deepseek-r1-tools:32b'
    roles:
      - chat

  - name: 'Qwen 3 4B (PLAN)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3:4b'
    roles:
      - chat

  - name: 'Qwen 3.5 27B (WRIT, Q8)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3.5-27b:q8'
    roles:
      - chat

  - name: 'Qwen 3.6 35B A3B (CODE, Q4)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3.6-35b:q4'
    roles:
      - chat
      - edit

  - name: 'Qwen3 Coder Next 80B (CODE, Q4)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-next-80b:q4'
    roles:
      - chat
      - edit

  - name: 'Qwen3 Coder Next 80B (CODE, Q4 64K)'
    provider: openai
    apiBase: http://localhost:11434/v1
    apiKey: 'sk-local'
    model: 'qwen3-coder-next-80b:q4-64k'
    roles:
      - chat
      - edit
      - summarize

  # ── Autocomplete — Ollama direct (latency-critical) ────────────────────────
  - name: 'Qwen 2.5 Coder 1.5B (FILL)'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'qwen2.5-coder:1.5b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  - name: 'Qwen 2.5 Coder 7B (FILL)'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'qwen2.5-coder:7b'
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # ── Embeddings — Ollama direct ─────────────────────────────────────────────
  - name: 'Nomic Embed Text (EMBD)'
    provider: openai
    apiBase: http://localhost:11434/v1
    model: 'nomic-embed-text'
    roles:
      - embed

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 1024
  disable: false

disableIndexing: false
