name: "Continue Config - Local Models (M5 64GB)"
version: "1.0.0"
schema: "v1"

models:
  # Primary coding model — 30B, tool-capable
  - name: "Qwen3 Coder 30B A3B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "qwen3.6-35b-32k-q6"
    roles:
      - chat
      - edit
      - apply
      - summarize

  # General chat / writing
  - name: "Qwen3.5 27B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "qwen3.5-27b"
    roles:
      - chat

  # Apply/insert — best code insertion
  - name: "Codestral 22B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "codestral-22b-v0.1-q8_0"
    roles:
      - apply

  # Reasoning with tool calls — 32B (fits comfortably at 64GB)
  - name: "DeepSeek R1 Tool-Calling 32B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "deepseek-r1-tools-32b"
    roles:
      - chat

  # Reasoning with tool calls — 14B fallback
  - name: "DeepSeek R1 Tool-Calling 14B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "deepseek-r1-tools-14b"
    roles:
      - chat

  # Large general model (solo use)
  - name: "Llama 3.3 70B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "llama3.3-70b"
    roles:
      - chat
      - edit

  # Autocomplete — default (fast, low RAM)
  # Short timeout: fail fast when Ollama is busy (model load / pull) to prevent VS Code freeze
  - name: "Qwen2.5 Coder 1.5B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "qwen2.5-coder-1.5b"
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # Autocomplete — quality
  - name: "Qwen2.5 Coder 7B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "qwen2.5-coder-7b"
    roles:
      - autocomplete
    requestOptions:
      timeout: 8000

  # Embedding model — stay on Ollama directly (more reliable than LiteLLM embed path)
  - name: "Nomic Embed Text"
    provider: ollama
    apiBase: http://localhost:11434
    model: "nomic-embed-text:latest"
    roles:
      - embed

  # Reranking — stay on Ollama directly
  - name: "Qwen3 Reranker 0.6B"
    provider: ollama
    apiBase: http://localhost:11434
    model: "dengcao/Qwen3-Reranker-0.6B:Q8_0"
    roles:
      - rerank

  # Fast planning
  - name: "Qwen3 4B"
    provider: openai
    apiBase: http://localhost:4000/v1
    apiKey: "sk-local"
    model: "qwen3-4b-q8"
    roles:
      - chat

tabAutocompleteOptions:
  debounceDelay: 500         # ms to wait after keystroke before firing (reduces request rate)
  maxPromptTokens: 1024      # keep context small → faster completions
  disable: false

# Set to true to stop Continue indexing files for @codebase search.
# Indexing runs nomic-embed-text on every file change — disable if you don't use @codebase.
disableIndexing: false
