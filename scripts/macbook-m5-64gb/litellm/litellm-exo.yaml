## LiteLLM config — Ollama + exo distributed inference
##
## Use this when exo is running across multiple Macs.
## Deploy: cp scripts/macbook-m5-64gb/litellm/litellm-exo.yaml ~/.config/litellm/config.yaml
##
## Startup order:
##   1. uv run exo          (on each Mac — peers auto-discover)
##   2. ollama serve        (local models)
##   3. litellm --config ~/.config/litellm/config.yaml --port 4000

model_list:
  # --- Coding (local Ollama) ---
  - model_name: qwen3-coder-30b-32k-q6
    litellm_params:
      model: ollama_chat/qwen3-coder-30b-32k:q6
      api_base: http://localhost:11434

  # --- Coding large ctx (exo — distributed) ---
  - model_name: qwen3-coder-30b-220k-q6
    litellm_params:
      model: openai/qwen3-coder-30b-220k:q6
      api_base: http://localhost:52415/v1
      api_key: sk-local

  # --- Writing / general (local Ollama) ---
  - model_name: qwen3.5-27b
    litellm_params:
      model: ollama_chat/qwen3.5:27b
      api_base: http://localhost:11434

  # --- Research (local Ollama) ---
  - model_name: qwen3-14b-q8
    litellm_params:
      model: ollama_chat/qwen3-14b:q8
      api_base: http://localhost:11434

  - model_name: qwen3-32b-q5
    litellm_params:
      model: ollama_chat/qwen3-32b:q5
      api_base: http://localhost:11434

  # --- Reasoning / tool calls (local Ollama) ---
  - model_name: deepseek-r1-tools-14b
    litellm_params:
      model: ollama_chat/deepseek-r1-tools:14b
      api_base: http://localhost:11434

  - model_name: deepseek-r1-tools-32b
    litellm_params:
      model: ollama_chat/deepseek-r1-tools:32b
      api_base: http://localhost:11434

  - model_name: deepseek-r1-14b
    litellm_params:
      model: ollama_chat/deepseek-r1:14b
      api_base: http://localhost:11434

  # --- Code apply/insert (local Ollama) ---
  - model_name: codestral-22b-v0.1-q8_0
    litellm_params:
      model: ollama_chat/codestral:22b-v0.1-q8_0
      api_base: http://localhost:11434

  # --- Coding fast (local Ollama) ---
  - model_name: qwen2.5-coder-7b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder-1.5b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:1.5b
      api_base: http://localhost:11434

  # --- Planning / fast (local Ollama) ---
  - model_name: qwen3-4b-q8
    litellm_params:
      model: ollama_chat/qwen3-4b:q8
      api_base: http://localhost:11434

  # --- General large (exo — distributed, solo-only on single machine) ---
  - model_name: llama3.3-70b
    litellm_params:
      model: openai/llama3.3:70b
      api_base: http://localhost:52415/v1
      api_key: sk-local

  # --- Embeddings (local Ollama) ---
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434

litellm_settings:
  set_verbose: false
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  model_group_alias:
    "gemini-2.5-pro":                      "qwen3.5-27b"
    "gemini-2.5-flash":                    "qwen3.5-27b"
    "gemini-2.5-flash-lite":               "qwen3-4b-q8"
    "gemini-3-flash-preview":              "qwen3.5-27b"
    "gemini-3-flash-preview-customtools":  "qwen3.5-27b"
    "gemini-3.1-pro-preview":              "qwen3-coder-30b-32k-q6"
    "gemini-3.1-pro-preview-customtools":  "qwen3-coder-30b-32k-q6"
